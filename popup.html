<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnipMemo</title>
<style>
  :root {
    --bg: rgba(255,255,255,0.72);
    --bg-card: rgba(255,255,255,0.55);
    --bg-input: rgba(255,255,255,0.65);
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --border: rgba(0,0,0,0.08);
    --shadow: 0 8px 32px rgba(0,0,0,0.06);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.10);
    --radius: 24px;
    --radius-sm: 14px;
    --radius-xs: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: rgba(28,28,30,0.78);
      --bg-card: rgba(44,44,46,0.60);
      --bg-input: rgba(44,44,46,0.70);
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --border: rgba(255,255,255,0.10);
      --shadow: 0 8px 32px rgba(0,0,0,0.20);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.28);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    width: 420px;
    min-height: 360px;
    max-height: 560px;
    overflow-y: auto;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: -1;
  }

  .container { padding: 16px 18px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-size: 18px; font-weight: 600; letter-spacing: -0.01em;
  }
  .header-link {
    font-size: 12px; color: var(--accent); text-decoration: none;
    font-weight: 500; cursor: pointer; background: none; border: none;
    font-family: var(--font);
  }
  .header-link:hover { opacity: 0.8; }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Capture panel */
  .capture-area {
    display: flex; flex-direction: column; gap: 14px; padding-top: 8px;
  }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px 20px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 500; font-family: var(--font);
    border-radius: var(--radius-xs); transition: all 0.2s ease;
    background: var(--bg-card); color: var(--text);
    box-shadow: var(--shadow);
    -webkit-font-smoothing: antialiased;
  }
  .btn:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 16px rgba(0,113,227,0.25);
  }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(0,113,227,0.35); }
  .btn-sm { width: auto; padding: 6px 16px; font-size: 13px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius-sm);
    padding: 28px 16px; text-align: center; cursor: pointer;
    transition: all 0.2s ease; background: var(--bg-card);
    color: var(--text-secondary); font-size: 13px;
  }
  .upload-zone:hover {
    border-color: var(--accent); color: var(--accent);
    background: var(--bg-input);
  }

  /* OCR panel */
  .ocr-preview { margin-bottom: 14px; }
  .ocr-preview img {
    width: 100%; border-radius: var(--radius-sm);
    box-shadow: var(--shadow); max-height: 120px; object-fit: cover;
  }
  .ocr-progress {
    text-align: center; padding: 20px; font-size: 13px; color: var(--text-secondary);
  }
  .ocr-spinner {
    width: 24px; height: 24px; border: 2.5px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Form */
  .form-group { margin-bottom: 10px; }
  .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input, .form-textarea, .form-select {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-xs); font-size: 13px; font-family: var(--font);
    background: var(--bg-input); color: var(--text);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    outline: none;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .form-textarea { resize: vertical; min-height: 80px; max-height: 140px; line-height: 1.5; }
  .form-select { cursor: pointer; }
  .form-actions { display: flex; gap: 10px; margin-top: 14px; }

  /* Success */
  .success-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(52,199,89,0.12); display: flex; align-items: center;
    justify-content: center; margin: 16px auto;
  }
  .success-icon svg { width: 28px; height: 28px; color: #34c759; }
  .success-text { text-align: center; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .success-sub { text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; }

  /* Scrollbar */
  body::-webkit-scrollbar { width: 4px; }
  body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  body::-webkit-scrollbar-track { background: transparent; }

  /* File input hidden */
  #fileInput { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <span class="header-title">SnipMemo</span>
    <button class="header-link" id="btnOpenApp">Open Library</button>
  </div>

  <!-- Panel: Capture -->
  <div class="panel active" id="panelCapture">
    <div class="capture-area">
      <button class="btn btn-primary" id="btnScreenshot">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="14" rx="3"/><circle cx="12" cy="14" r="3"/><path d="M8 6V4h8v2"/></svg>
        Capture Current Page
      </button>
      <div class="upload-zone" id="uploadZone">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:8px;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div>Drop image here or click to upload</div>
        <div style="font-size:11px;margin-top:4px;opacity:0.6;">PNG, JPG, GIF supported</div>
      </div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
  </div>

  <!-- Panel: OCR Processing -->
  <div class="panel" id="panelOCR">
    <div class="ocr-preview" id="ocrPreview"></div>
    <div class="ocr-progress" id="ocrProgress">
      <div class="ocr-spinner"></div>
      <div id="ocrStatus">Processing image...</div>
    </div>
    <div id="ocrForm" style="display:none;">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-input" id="ocrTitle" placeholder="Note title">
      </div>
      <div class="form-group">
        <label class="form-label">Content</label>
        <textarea class="form-textarea" id="ocrContent" placeholder="Extracted text will appear here..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Folder</label>
        <select class="form-select" id="ocrFolder"></select>
      </div>
      <div class="form-group" style="display:none;" id="ocrKeywordsGroup">
        <label class="form-label">Suggested Keywords</label>
        <div class="form-input" id="ocrKeywords" style="font-size:12px;color:var(--text-secondary);padding:8px 12px;"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-sm" id="btnCancelOCR">Cancel</button>
        <button class="btn btn-sm btn-primary" id="btnSaveOCR">Save Note</button>
      </div>
    </div>
  </div>

  <!-- Panel: Success -->
  <div class="panel" id="panelSuccess">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-text">Note saved</div>
    <div class="success-sub">Your note has been added to the library.</div>
    <div class="form-actions" style="justify-content:center;">
      <button class="btn btn-sm" id="btnNewCapture">Capture Another</button>
      <button class="btn btn-sm btn-primary" id="btnViewLibrary">View Library</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="common.js"></script>
<script src="popup.js"></script>
</body>
</html>
