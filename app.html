<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnipMemo - Knowledge Base</title>
<style>
  :root {
    --bg: #f5f5f7;
    --bg-glass: rgba(255,255,255,0.72);
    --bg-card: rgba(255,255,255,0.55);
    --bg-input: rgba(255,255,255,0.65);
    --bg-hover: rgba(0,0,0,0.04);
    --bg-active: rgba(0,113,227,0.08);
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --border: rgba(0,0,0,0.08);
    --border-light: rgba(0,0,0,0.04);
    --shadow: 0 8px 32px rgba(0,0,0,0.06);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.10);
    --shadow-card: 0 2px 12px rgba(0,0,0,0.04);
    --radius: 24px;
    --radius-md: 18px;
    --radius-sm: 14px;
    --radius-xs: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --sidebar-w: 280px;
    --qa-h: 48px;
    --qa-expanded-h: 280px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg-glass: rgba(28,28,30,0.78);
      --bg-card: rgba(44,44,46,0.60);
      --bg-input: rgba(44,44,46,0.70);
      --bg-hover: rgba(255,255,255,0.06);
      --bg-active: rgba(10,132,255,0.12);
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --text-tertiary: #636366;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --border: rgba(255,255,255,0.10);
      --border-light: rgba(255,255,255,0.05);
      --shadow: 0 8px 32px rgba(0,0,0,0.20);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.28);
      --shadow-card: 0 2px 12px rgba(0,0,0,0.12);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; overflow: hidden;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .app {
    display: flex; height: 100vh;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    height: 100%; display: flex; flex-direction: column;
    background: var(--bg-glass);
    border-right: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 10;
  }
  .sidebar-header {
    padding: 20px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title {
    font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
  }
  .sidebar-actions {
    display: flex; gap: 6px;
  }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--bg-card); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); transition: all 0.2s ease;
    box-shadow: var(--shadow-card);
  }
  .icon-btn:hover { color: var(--text); background: var(--bg-hover); box-shadow: var(--shadow-hover); }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn svg { width: 16px; height: 16px; }

  .folder-list {
    flex: 1; overflow-y: auto; padding: 0 12px 12px;
  }
  .folder-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-xs);
    cursor: pointer; font-size: 14px; font-weight: 450; color: var(--text);
    transition: all 0.15s ease; margin-bottom: 2px;
    position: relative;
  }
  .folder-item:hover { background: var(--bg-hover); }
  .folder-item.active {
    background: var(--bg-active); color: var(--accent); font-weight: 550;
  }
  .folder-item .folder-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .folder-item.active .folder-icon { opacity: 1; color: var(--accent); }
  .folder-item .folder-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .folder-item .folder-count {
    font-size: 11px; color: var(--text-tertiary); background: var(--bg-hover);
    padding: 2px 8px; border-radius: 20px; min-width: 24px; text-align: center;
  }
  .folder-item .folder-actions {
    display: none; gap: 2px; align-items: center;
  }
  .folder-item:hover .folder-actions { display: flex; }
  .folder-item .mini-btn {
    width: 22px; height: 22px; border-radius: 6px; border: none;
    background: transparent; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    color: var(--text-tertiary); font-size: 12px; transition: all 0.15s ease;
  }
  .folder-item .mini-btn:hover { color: var(--text); background: var(--bg-hover); }

  .folder-list::-webkit-scrollbar { width: 3px; }
  .folder-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
  .folder-list::-webkit-scrollbar-track { background: transparent; }

  /* Main area */
  .main {
    flex: 1; display: flex; flex-direction: column; height: 100%;
    overflow: hidden; position: relative;
  }

  /* Top bar */
  .topbar {
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    background: var(--bg-glass); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    z-index: 5;
  }
  .search-wrap {
    flex: 1; position: relative; max-width: 480px;
  }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--text-tertiary); pointer-events: none;
  }
  .search-input {
    width: 100%; padding: 9px 16px 9px 40px;
    border: 1px solid var(--border); border-radius: var(--radius-xs);
    font-size: 14px; font-family: var(--font);
    background: var(--bg-input); color: var(--text);
    outline: none; transition: all 0.2s ease;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .search-input::placeholder { color: var(--text-tertiary); }

  /* Content */
  .content {
    flex: 1; overflow-y: auto; padding: 20px 24px 100px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .content::-webkit-scrollbar { width: 5px; }
  .content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 5px; }
  .content::-webkit-scrollbar-track { background: transparent; }

  /* Note cards */
  .notes-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .note-card {
    background: var(--bg-card); border-radius: var(--radius-md);
    padding: 16px 18px; cursor: pointer; box-shadow: var(--shadow-card);
    transition: all 0.2s ease; border: 1px solid var(--border-light);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .note-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .note-card:active { transform: scale(0.99); }
  .note-card .card-title {
    font-size: 15px; font-weight: 600; margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .note-card .card-preview {
    font-size: 13px; color: var(--text-secondary); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 8px;
  }
  .note-card .card-images {
    display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto;
  }
  .note-card .card-images img {
    height: 56px; border-radius: 8px; object-fit: cover;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .note-card .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-tertiary);
  }
  .note-card .card-tags {
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .note-card .card-tag {
    font-size: 10px; background: var(--bg-hover); padding: 1px 8px;
    border-radius: 10px; color: var(--text-secondary);
  }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: var(--text-tertiary); text-align: center;
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state .empty-title { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-state .empty-desc { font-size: 14px; }

  /* Editor overlay */
  .editor-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
  }
  .editor-overlay.active { display: flex; }
  .editor-panel {
    width: 90%; max-width: 680px; max-height: 85vh; overflow-y: auto;
    background: var(--bg-glass); border-radius: var(--radius);
    box-shadow: 0 16px 64px rgba(0,0,0,0.15);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    padding: 24px 28px;
  }
  .editor-panel .form-group { margin-bottom: 14px; }
  .editor-panel .form-label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .editor-panel .form-input, .editor-panel .form-textarea, .editor-panel .form-select {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-xs); font-size: 14px; font-family: var(--font);
    background: var(--bg-input); color: var(--text);
    outline: none; transition: all 0.2s ease;
  }
  .editor-panel .form-input:focus,
  .editor-panel .form-textarea:focus,
  .editor-panel .form-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .editor-panel .form-textarea {
    resize: vertical; min-height: 160px; line-height: 1.6;
    font-size: 14px;
  }
  .editor-panel .form-select { cursor: pointer; }
  .editor-panel .editor-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;
  }
  .btn {
    padding: 10px 22px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 500; font-family: var(--font);
    border-radius: var(--radius-xs); transition: all 0.2s ease;
    background: var(--bg-card); color: var(--text);
    box-shadow: var(--shadow-card);
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { box-shadow: var(--shadow-hover); }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 14px rgba(0,113,227,0.25);
  }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(0,113,227,0.35); }
  .btn-danger {
    background: rgba(255,59,48,0.1); color: #ff3b30;
    box-shadow: none;
  }
  .btn-danger:hover { background: rgba(255,59,48,0.18); }

  .editor-images-preview {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
  }
  .editor-images-preview img {
    width: 80px; height: 80px; object-fit: cover;
    border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* Floating new note */
  .fab {
    position: fixed; bottom: 32px; right: 32px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,113,227,0.30);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; z-index: 40;
  }
  .fab:hover {
    transform: scale(1.06);
    box-shadow: 0 12px 36px rgba(0,113,227,0.38);
  }
  .fab:active { transform: scale(0.96); }
  .fab svg { width: 24px; height: 24px; }

  /* Local Q&A panel */
  .qa-panel {
    position: fixed; bottom: 0; left: var(--sidebar-w); right: 0;
    background: var(--bg-glass); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    z-index: 30; transition: height 0.3s ease;
    height: var(--qa-h); overflow: hidden;
  }
  .qa-panel.expanded { height: var(--qa-expanded-h); }
  .qa-header {
    height: var(--qa-h); display: flex; align-items: center;
    padding: 0 20px; cursor: pointer; user-select: none;
    justify-content: space-between;
  }
  .qa-header-title {
    font-size: 13px; font-weight: 550; color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
  }
  .qa-header-arrow {
    transition: transform 0.2s ease; color: var(--text-tertiary);
  }
  .qa-panel.expanded .qa-header-arrow { transform: rotate(180deg); }
  .qa-body {
    padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px;
    height: calc(var(--qa-expanded-h) - var(--qa-h)); overflow-y: auto;
  }
  .qa-input-row { display: flex; gap: 10px; }
  .qa-input {
    flex: 1; padding: 9px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-xs); font-size: 13px; font-family: var(--font);
    background: var(--bg-input); color: var(--text); outline: none;
    transition: all 0.2s ease;
  }
  .qa-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .qa-results {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
  }
  .qa-result-item {
    padding: 10px 14px; background: var(--bg-card); border-radius: var(--radius-xs);
    cursor: pointer; font-size: 13px; transition: all 0.15s ease;
    border: 1px solid var(--border-light);
  }
  .qa-result-item:hover { background: var(--bg-hover); }
  .qa-result-item .qa-result-title { font-weight: 550; margin-bottom: 2px; }
  .qa-result-item .qa-result-snippet {
    font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .qa-result-item .qa-result-score {
    font-size: 10px; color: var(--text-tertiary); margin-top: 4px;
  }

  /* Responsive */
  @media (max-width: 720px) {
    .sidebar {
      width: 100%; min-width: 100%; position: fixed; inset: 0;
      z-index: 60; transform: translateX(-100%); transition: transform 0.25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .main { width: 100%; }
    .qa-panel { left: 0; }
    .notes-grid { grid-template-columns: 1fr; }
    .topbar { padding: 12px 16px; }
    .content { padding: 16px 16px 100px; }
    .fab { bottom: 24px; right: 20px; }
    .editor-panel { width: 94%; padding: 20px; }

    .mobile-menu-btn {
      display: flex !important;
    }
  }

  .mobile-menu-btn {
    display: none; width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--bg-card); cursor: pointer;
    align-items: center; justify-content: center;
    color: var(--text-secondary); box-shadow: var(--shadow-card);
  }
  .sidebar-backdrop {
    display: none; position: fixed; inset: 0; z-index: 55;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
  }
  .sidebar-backdrop.open { display: block; }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-glass); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: var(--radius-xs);
    padding: 10px 24px; font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow); z-index: 80;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
    pointer-events: none;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
</style>
</head>
<body>

<div class="app">
  <!-- Mobile backdrop -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">SnipMemo</span>
      <div class="sidebar-actions">
        <button class="icon-btn" id="btnNewFolder" title="New Folder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>
      </div>
    </div>
    <nav class="folder-list" id="folderList"></nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="mobile-menu-btn" id="btnMobileMenu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search notes...">
      </div>
    </div>
    <div class="content" id="contentArea">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div class="empty-title">No notes yet</div>
        <div class="empty-desc">Click + to create your first note, or use the extension popup to capture a screenshot.</div>
      </div>
    </div>
  </main>
</div>

<!-- Floating new note -->
<button class="fab" id="fabNewNote" title="New Note">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Editor overlay -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-panel" id="editorPanel"></div>
</div>

<!-- Local Q&A -->
<div class="qa-panel" id="qaPanel">
  <div class="qa-header" id="qaHeader">
    <span class="qa-header-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Local Search
    </span>
    <svg class="qa-header-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="qa-body">
    <div class="qa-input-row">
      <input type="text" class="qa-input" id="qaInput" placeholder="Type keywords to search across all notes...">
      <button class="btn btn-primary" id="qaSearchBtn" style="padding:9px 16px;font-size:13px;">Search</button>
    </div>
    <div class="qa-results" id="qaResults"></div>
  </div>
</div>

<script src="common.js"></script>
<script src="app.js"></script>
</body>
</html>
